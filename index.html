<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presto.it</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">Presto.it</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12 col-md-4 col-lg-3 mb-4">
                <div class="card p-4 shadow-sm border-0">
                    <h5 class="mb-3 fw-bold text-primary">Cerca Annuncio</h5>
                    <input type="text" id="wordInput" class="form-control mb-4" placeholder="Cosa cerchi?">

                    <h5 class="mb-3 fw-bold text-primary">Categorie</h5>
                    <div id="categoryWrapper" class="mb-4">
                        <div class="form-check mb-2">
                            <input class="form-check-input category-radio" type="radio" name="category" id="All" value="All" checked>
                            <label class="form-check-label" for="All">Tutte le categorie</label>
                        </div>
                    </div>

                    <h5 class="mb-3 fw-bold text-primary">Prezzo Massimo</h5>
                    <p class="mb-1 fw-bold fs-5 text-end">€ <span id="priceValue"></span></p>
                    <input type="range" id="priceInput" class="form-range" min="0" step="1">
                </div>
            </div>

            <div class="col-12 col-md-8 col-lg-9">
                <div class="row" id="adsWrapper"></div>
            </div>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
